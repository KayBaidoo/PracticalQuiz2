<!DOCTYPE html>
<html>
<head>
  <title>Tropical Cafe Scene</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>
<!--
  =================================================================
  SCENE CONCEPT: Tropical open-air beach cafe at golden hour
  -----------------------------------------------------------------
  KEY DIFFERENCES from the inspiration source:
  - Sandy desert/beach ground instead of green grass
  - Raised wooden deck hut (not a Chinese pavilion)
  - No entrance arch/gate — replaced with a low wooden fence
  - Rectangular table on the LEFT inside hut (not round & centred)
  - Rattan-style chairs (tan, not red)
  - SPINNING CEILING FAN built from primitives
  - Coconut palm trees with cone leaves (not ball-foliage trees)
  - Circular plunge pool at the FRONT-RIGHT (not back-right)
  - Cone-petal tropical flowers (not sphere flowers)
  - Clay pot decorations
  - Standing lantern posts (not hanging gate lanterns)
  - Warm golden-hour sky and lighting (not blue daytime sky)
  =================================================================
-->

<a-scene fog="type: exponential; color: #f4d9a0; density: 0.015">

  <!-- ============================================================
       ASSETS — textures are preloaded here so they are ready
       when the scene starts rendering.
       Paths match the textures/ folder next to index.html.
       ============================================================ -->
  <a-assets>
    <img id="miloTex" src="textures/milo.jpg">
    <img id="milkTex" src="textures/milk.jpg">
    <img id="cup1Tex" src="textures/cup1.jpg">
    <img id="cup2Tex" src="textures/cup2.jpg">
  </a-assets>

  <!-- ============================================================
       CAMERA — player stands outside the hut, looking in diagonally
       ============================================================ -->
  <a-entity position="-3 2.2 9">
    <a-camera wasd-controls="acceleration: 80" look-controls></a-camera>
  </a-entity>

  <!-- ============================================================
       SKY — warm golden-hour / sunset colour (not blue daytime)
       ============================================================ -->
  <a-sky color="#f0a04b"></a-sky>

  <!-- ============================================================
       LIGHTING — mimics warm late-afternoon tropical sunlight
       ============================================================ -->

  <!-- Warm golden ambient so shadows stay soft, not pitch-black -->
  <a-light type="ambient" color="#ffe4a0" intensity="0.7"></a-light>

  <!-- Main sun: low angle from the right like late afternoon -->
  <a-light type="directional" position="10 8 3"  color="#ffcc66" intensity="1.2"></a-light>

  <!-- Cool sky bounce light from opposite side to soften shadows -->
  <a-light type="directional" position="-8 6 -2" color="#a8d0e8" intensity="0.25"></a-light>

  <!-- Warm overhead point light inside the hut (like a ceiling bulb) -->
  <a-light type="point" position="-2.5 3.4 -1" color="#ffbb44" intensity="1.4" distance="9"></a-light>

  <!-- ============================================================
       GROUND — warm sandy beach / dry earth
       Two tones of sandy colour break up the flat look.
       ============================================================ -->

  <!-- Main sandy ground (replaces the green grass of the original) -->
  <a-plane rotation="-90 0 0" width="70" height="70" color="#d4a85a"></a-plane>

  <!-- Lighter sandy patches for natural surface variation -->
  <a-plane rotation="-90 0 0" position=" 8  0.01 -4" width="10" height="8"  color="#ddb96a"></a-plane>
  <a-plane rotation="-90 0 0" position="-9  0.01  5" width="8"  height="6"  color="#c89948"></a-plane>
  <a-plane rotation="-90 0 0" position=" 2  0.01  9" width="14" height="5"  color="#ddb96a"></a-plane>

  <!-- ============================================================
       LOW WOODEN FENCE — borders the scene
       Replaces the original's Chinese entrance arch completely.
       Made of horizontal rails and vertical posts.
       ============================================================ -->

  <!-- Back fence: two horizontal rails + 5 posts -->
  <a-box position="0 0.55 -9"  width="18" height="0.08" depth="0.12" color="#8B6340"></a-box>
  <a-box position="0 0.28 -9"  width="18" height="0.08" depth="0.12" color="#8B6340"></a-box>
  <a-box position="-8  0.42 -9" width="0.12" height="0.85" depth="0.12" color="#7A5530"></a-box>
  <a-box position="-4  0.42 -9" width="0.12" height="0.85" depth="0.12" color="#7A5530"></a-box>
  <a-box position=" 0  0.42 -9" width="0.12" height="0.85" depth="0.12" color="#7A5530"></a-box>
  <a-box position=" 4  0.42 -9" width="0.12" height="0.85" depth="0.12" color="#7A5530"></a-box>
  <a-box position=" 8  0.42 -9" width="0.12" height="0.85" depth="0.12" color="#7A5530"></a-box>

  <!-- Left side fence: two rails + 5 posts -->
  <a-box position="-9 0.55 0"  width="0.12" height="0.08" depth="18"  color="#8B6340"></a-box>
  <a-box position="-9 0.28 0"  width="0.12" height="0.08" depth="18"  color="#8B6340"></a-box>
  <a-box position="-9 0.42  8" width="0.12" height="0.85" depth="0.12" color="#7A5530"></a-box>
  <a-box position="-9 0.42  4" width="0.12" height="0.85" depth="0.12" color="#7A5530"></a-box>
  <a-box position="-9 0.42  0" width="0.12" height="0.85" depth="0.12" color="#7A5530"></a-box>
  <a-box position="-9 0.42 -4" width="0.12" height="0.85" depth="0.12" color="#7A5530"></a-box>
  <a-box position="-9 0.42 -8" width="0.12" height="0.85" depth="0.12" color="#7A5530"></a-box>

  <!-- ============================================================
       RAISED WOODEN DECK HUT
       Style: open tropical cabana with a pyramid/hip roof.
       Positioned to the LEFT of the scene — not centred.
       ============================================================ -->

  <!-- Raised wooden deck floor -->
  <a-box position="-2.5 0.2 0" width="8" height="0.4" depth="6" color="#A0784A"></a-box>
  <!-- Deck edge strip (slightly darker, adds thickness appearance) -->
  <a-box position="-2.5 0.38 0" width="8.2" height="0.08" depth="6.2" color="#8B6336"></a-box>

  <!-- Front steps leading onto the deck -->
  <a-box position="-2.5 0.12 3.35" width="1.6" height="0.25" depth="0.3" color="#9B7040"></a-box>

  <!-- Four bamboo-coloured round corner pillars -->
  <a-cylinder position="-6.2 2.0  2.8" radius="0.18" height="4.0" color="#c8a86a"></a-cylinder>
  <a-cylinder position=" 1.2 2.0  2.8" radius="0.18" height="4.0" color="#c8a86a"></a-cylinder>
  <a-cylinder position="-6.2 2.0 -2.8" radius="0.18" height="4.0" color="#c8a86a"></a-cylinder>
  <a-cylinder position=" 1.2 2.0 -2.8" radius="0.18" height="4.0" color="#c8a86a"></a-cylinder>

  <!-- Wide base ring that caps the pillars at roof level -->
  <a-cylinder position="-2.5 4.1 0" radius="5.0" height="0.2" color="#8B5E2A"></a-cylinder>

  <!-- Pyramid hip roof — terracotta / rust tile colour -->
  <a-cone position="-2.5 5.8 0"
          radius-bottom="5.0"
          radius-top="0.15"
          height="3.4"
          color="#C1440E">
  </a-cone>

  <!-- Gold decorative finial at the roof peak -->
  <a-sphere   position="-2.5 7.5 0" radius="0.2"  color="#DAA520"></a-sphere>
  <a-cylinder position="-2.5 7.75 0" radius="0.05" height="0.4" color="#DAA520"></a-cylinder>

  <!-- ============================================================
       CEILING FAN inside the hut
       ---------------------------------------------------------
       HOW IT WORKS:
       - A hanging rod drops from the roof to the motor hub.
       - An <a-entity> wraps the motor + 4 blades together.
       - The animation component rotates the whole entity 360°
         on the Y axis in a continuous loop, making it spin.
       - Blades are flat box primitives at 90° intervals.
       ============================================================ -->

  <!-- Hanging rod (static — does not spin) -->
  <a-cylinder position="-2.5 4.0 0" radius="0.04" height="0.8" color="#555555"></a-cylinder>

  <!-- Spinning fan assembly: motor hub + 4 blades -->
  <a-entity position="-2.5 3.55 0"
            animation="property: rotation;
                       to: 0 360 0;
                       loop: true;
                       dur: 2200;
                       easing: linear">

    <!-- Motor hub (central cylinder) -->
    <a-cylinder radius="0.18" height="0.22" color="#444444"></a-cylinder>
    <!-- Bottom cap of motor -->
    <a-cylinder position="0 -0.14 0" radius="0.14" height="0.04" color="#666666"></a-cylinder>

    <!-- Blade 1 — forward (+Z direction) -->
    <a-box position=" 0    0.06  0.65" width="0.28" height="0.06" depth="1.1" color="#c8a86a"></a-box>
    <!-- Blade 2 — backward (-Z direction) -->
    <a-box position=" 0    0.06 -0.65" width="0.28" height="0.06" depth="1.1" color="#c8a86a"></a-box>
    <!-- Blade 3 — right (+X direction) -->
    <a-box position=" 0.65 0.06  0"   width="1.1" height="0.06" depth="0.28" color="#b89458"></a-box>
    <!-- Blade 4 — left (-X direction) -->
    <a-box position="-0.65 0.06  0"   width="1.1" height="0.06" depth="0.28" color="#b89458"></a-box>

  </a-entity>
  <!-- END CEILING FAN -->

  <!-- ============================================================
       TABLE — rectangular dark mahogany, placed LEFT in the hut
       Original had a ROUND table in the centre.
       This one is RECTANGULAR and offset to one side.
       ============================================================ -->

  <!-- Table top surface -->
  <a-box position="-3.5 1.52 -0.2" width="1.6" height="0.1" depth="0.9" color="#6B3A2A"></a-box>
  <!-- Dark overhang edge strip -->
  <a-box position="-3.5 1.55 -0.2" width="1.65" height="0.04" depth="0.95" color="#4E2A18"></a-box>

  <!-- Four slim dark mahogany legs -->
  <a-cylinder position="-4.25 0.87 -0.55" radius="0.055" height="1.75" color="#4E2A18"></a-cylinder>
  <a-cylinder position="-2.75 0.87 -0.55" radius="0.055" height="1.75" color="#4E2A18"></a-cylinder>
  <a-cylinder position="-4.25 0.87  0.15" radius="0.055" height="1.75" color="#4E2A18"></a-cylinder>
  <a-cylinder position="-2.75 0.87  0.15" radius="0.055" height="1.75" color="#4E2A18"></a-cylinder>

  <!-- ============================================================
       CHAIR 1 — sits on the LEFT long side of the table
       Rattan / wicker colour palette: tan seat, dark legs
       ============================================================ -->

  <!-- Seat pad -->
  <a-box position="-4.75 1.02 -0.2" width="0.6" height="0.1" depth="0.6" color="#C8A878"></a-box>
  <!-- Back rest panel -->
  <a-box position="-5.1 1.52 -0.2"  width="0.12" height="1.0" depth="0.6" color="#A08050"></a-box>
  <!-- Back legs -->
  <a-cylinder position="-5.06 0.52 -0.46" radius="0.04" height="1.0" color="#7A5C30"></a-cylinder>
  <a-cylinder position="-5.06 0.52  0.06" radius="0.04" height="1.0" color="#7A5C30"></a-cylinder>
  <!-- Front legs -->
  <a-cylinder position="-4.46 0.52 -0.46" radius="0.04" height="1.0" color="#7A5C30"></a-cylinder>
  <a-cylinder position="-4.46 0.52  0.06" radius="0.04" height="1.0" color="#7A5C30"></a-cylinder>

  <!-- ============================================================
       CHAIR 2 — sits on the RIGHT long side of the table
       ============================================================ -->

  <!-- Seat pad -->
  <a-box position="-2.25 1.02 -0.2" width="0.6" height="0.1" depth="0.6" color="#C8A878"></a-box>
  <!-- Back rest panel -->
  <a-box position="-1.9 1.52 -0.2"  width="0.12" height="1.0" depth="0.6" color="#A08050"></a-box>
  <!-- Back legs -->
  <a-cylinder position="-1.94 0.52 -0.46" radius="0.04" height="1.0" color="#7A5C30"></a-cylinder>
  <a-cylinder position="-1.94 0.52  0.06" radius="0.04" height="1.0" color="#7A5C30"></a-cylinder>
  <!-- Front legs -->
  <a-cylinder position="-2.54 0.52 -0.46" radius="0.04" height="1.0" color="#7A5C30"></a-cylinder>
  <a-cylinder position="-2.54 0.52  0.06" radius="0.04" height="1.0" color="#7A5C30"></a-cylinder>

  <!-- ============================================================
       MILO TIN — on the table, left position
       Texture from textures/milo.jpg wraps around the cylinder.
       color="#ffffff" ensures the image shows its true colours.
       ============================================================ -->

  <!-- Milo tin body (textured) -->
  <a-cylinder position="-4.1 1.72 -0.15"
              radius="0.13" height="0.42"
              src="#miloTex"
              color="#ffffff">
  </a-cylinder>
  <!-- Dark green lid (matches Milo brand colour) -->
  <a-cylinder position="-4.1 1.94 -0.15" radius="0.14" height="0.06" color="#1B5E20"></a-cylinder>
  <!-- Gold bottom rim -->
  <a-cylinder position="-4.1 1.51 -0.15" radius="0.14" height="0.04" color="#DAA520"></a-cylinder>

  <!-- ============================================================
       MILK TIN — on the table, right of the Milo tin
       Texture from textures/milk.jpg.
       Silver lid and rim — clearly different from Milo.
       ============================================================ -->

  <!-- Milk tin body (textured) -->
  <a-cylinder position="-3.4 1.72 -0.15"
              radius="0.13" height="0.42"
              src="#milkTex"
              color="#ffffff">
  </a-cylinder>
  <!-- Silver lid (visually different from Milo's green) -->
  <a-cylinder position="-3.4 1.94 -0.15" radius="0.14" height="0.06" color="#CFD8DC"></a-cylinder>
  <!-- Silver bottom rim -->
  <a-cylinder position="-3.4 1.51 -0.15" radius="0.14" height="0.04" color="#B0BEC5"></a-cylinder>

  <!-- ============================================================
       CUP 1 — on table, left of centre
       open-ended="true" removes the top cap, making it hollow.
       A torus ring at the rim frames the open top visually.
       A dark disc inside shows the tea surface when looking down.
       ============================================================ -->

  <!-- Cup 1 outer wall (textured, open top) -->
  <a-cylinder position="-3.85 1.63 0.18"
              radius="0.105" height="0.2"
              src="#cup1Tex"
              color="#ffffff"
              open-ended="true">
  </a-cylinder>
  <!-- Closed base disc (cup bottom) -->
  <a-cylinder position="-3.85 1.53 0.18" radius="0.105" height="0.01" color="#D4C4A0"></a-cylinder>
  <!-- Rim torus — shows the open top edge clearly -->
  <a-torus position="-3.85 1.73 0.18"
           radius="0.105" radius-tubular="0.011"
           rotation="90 0 0" color="#B8956A">
  </a-torus>
  <!-- Cup handle -->
  <a-torus position="-3.63 1.63 0.18"
           radius="0.065" radius-tubular="0.013"
           rotation="0 90 0" color="#F5E6C8">
  </a-torus>
  <!-- Tea liquid surface visible from above -->
  <a-cylinder position="-3.85 1.72 0.18" radius="0.092" height="0.01" color="#7A4A20"></a-cylinder>

  <!-- ============================================================
       CUP 2 — on table, right of Cup 1
       Same open-cup construction. Different texture.
       ============================================================ -->

  <!-- Cup 2 outer wall (textured, open top) -->
  <a-cylinder position="-3.2 1.63 0.18"
              radius="0.105" height="0.2"
              src="#cup2Tex"
              color="#ffffff"
              open-ended="true">
  </a-cylinder>
  <!-- Closed base disc -->
  <a-cylinder position="-3.2 1.53 0.18" radius="0.105" height="0.01" color="#D4C4A0"></a-cylinder>
  <!-- Rim torus -->
  <a-torus position="-3.2 1.73 0.18"
           radius="0.105" radius-tubular="0.011"
           rotation="90 0 0" color="#B8956A">
  </a-torus>
  <!-- Cup handle -->
  <a-torus position="-2.98 1.63 0.18"
           radius="0.065" radius-tubular="0.013"
           rotation="0 90 0" color="#F5E6C8">
  </a-torus>
  <!-- Tea liquid surface -->
  <a-cylinder position="-3.2 1.72 0.18" radius="0.092" height="0.01" color="#7A4A20"></a-cylinder>

  <!-- ============================================================
       COCONUT PALM TREES
       ---------------------------------------------------------
       Style: multi-segment curved trunk + cone "frond" leaves.
       Completely different from the original's ball-sphere foliage.
       Trunk segments are stacked with slight X-offsets to fake a
       natural lean/curve. Leaves are elongated cones rotated outward.
       ============================================================ -->

  <!-- PALM 1 — right front, leans right -->
  <a-cylinder position="5.5 0.8  5"  radius="0.2"  height="1.6" color="#8B7040" rotation="0 0  4"></a-cylinder>
  <a-cylinder position="5.8 2.1  5"  radius="0.17" height="1.4" color="#9B8050" rotation="0 0  6"></a-cylinder>
  <a-cylinder position="6.1 3.3  5"  radius="0.14" height="1.2" color="#9B8050" rotation="0 0  5"></a-cylinder>
  <!-- 6 frond leaves radiating from the crown -->
  <a-cone position="6.3 4.3 5" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#3A8020" rotation="-20   0 0"></a-cone>
  <a-cone position="6.3 4.3 5" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#4A9030" rotation="-20  60 0"></a-cone>
  <a-cone position="6.3 4.3 5" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#3A8020" rotation="-20 120 0"></a-cone>
  <a-cone position="6.3 4.3 5" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#4A9030" rotation="-20 180 0"></a-cone>
  <a-cone position="6.3 4.3 5" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#3A8020" rotation="-20 240 0"></a-cone>
  <a-cone position="6.3 4.3 5" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#4A9030" rotation="-20 300 0"></a-cone>
  <!-- Coconuts clustered under the fronds -->
  <a-sphere position="6.0 4.0  5.3" radius="0.18" color="#5C3B1A"></a-sphere>
  <a-sphere position="6.5 3.9  4.8" radius="0.16" color="#5C3B1A"></a-sphere>

  <!-- PALM 2 — far right back, leans left -->
  <a-cylinder position="7.5 0.8 -3"  radius="0.2"  height="1.6" color="#8B7040" rotation="0 0 -5"></a-cylinder>
  <a-cylinder position="7.2 2.1 -3"  radius="0.17" height="1.4" color="#9B8050" rotation="0 0 -7"></a-cylinder>
  <a-cylinder position="6.9 3.3 -3"  radius="0.14" height="1.2" color="#9B8050" rotation="0 0 -5"></a-cylinder>
  <a-cone position="6.7 4.3 -3" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#3A8020" rotation="-20  30 0"></a-cone>
  <a-cone position="6.7 4.3 -3" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#4A9030" rotation="-20  90 0"></a-cone>
  <a-cone position="6.7 4.3 -3" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#3A8020" rotation="-20 150 0"></a-cone>
  <a-cone position="6.7 4.3 -3" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#4A9030" rotation="-20 210 0"></a-cone>
  <a-cone position="6.7 4.3 -3" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#3A8020" rotation="-20 270 0"></a-cone>
  <a-cone position="6.7 4.3 -3" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#4A9030" rotation="-20 330 0"></a-cone>
  <a-sphere position="6.5 4.0 -2.7" radius="0.17" color="#5C3B1A"></a-sphere>
  <a-sphere position="7.0 3.9 -3.3" radius="0.16" color="#5C3B1A"></a-sphere>

  <!-- PALM 3 — far left back, upright -->
  <a-cylinder position="-8 0.8 -5"   radius="0.2"  height="1.7" color="#8B7040"></a-cylinder>
  <a-cylinder position="-8 2.2 -5"   radius="0.17" height="1.4" color="#9B8050"></a-cylinder>
  <a-cylinder position="-8 3.5 -5"   radius="0.14" height="1.3" color="#9B8050"></a-cylinder>
  <a-cone position="-8 4.5 -5" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#3A8020" rotation="-20   0 0"></a-cone>
  <a-cone position="-8 4.5 -5" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#4A9030" rotation="-20  72 0"></a-cone>
  <a-cone position="-8 4.5 -5" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#3A8020" rotation="-20 144 0"></a-cone>
  <a-cone position="-8 4.5 -5" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#4A9030" rotation="-20 216 0"></a-cone>
  <a-cone position="-8 4.5 -5" radius-bottom="0.05" radius-top="0.01" height="2.4" color="#3A8020" rotation="-20 288 0"></a-cone>
  <a-sphere position="-8.3 4.2 -5.3" radius="0.17" color="#5C3B1A"></a-sphere>

  <!-- ============================================================
       CIRCULAR PLUNGE POOL — FRONT RIGHT of scene
       ---------------------------------------------------------
       Different from original: placed front-right (not back-right),
       no lily pads, has decorative tile rings and stepping stones.
       ============================================================ -->

  <!-- Pool water surface (vivid tropical blue, semi-transparent) -->
  <a-cylinder position="5.5 0.05 3.5" radius="2.0" height="0.18" color="#1a8ab5" opacity="0.82"></a-cylinder>

  <!-- Pool rim wall (raised white tile edge) -->
  <a-torus position="5.5 0.3 3.5"
           radius="2.0" radius-tubular="0.22"
           rotation="90 0 0" color="#E8E0D0">
  </a-torus>

  <!-- Decorative blue inner tile ring just inside the rim -->
  <a-torus position="5.5 0.32 3.5"
           radius="1.82" radius-tubular="0.06"
           rotation="90 0 0" color="#2196F3">
  </a-torus>

  <!-- Four stepping-stone discs at cardinal points around pool -->
  <a-cylinder position="5.5 0.24  5.6" radius="0.3" height="0.1" color="#c8b88a"></a-cylinder>
  <a-cylinder position="5.5 0.24  1.4" radius="0.3" height="0.1" color="#c8b88a"></a-cylinder>
  <a-cylinder position="3.4 0.24  3.5" radius="0.3" height="0.1" color="#c8b88a"></a-cylinder>
  <a-cylinder position="7.6 0.24  3.5" radius="0.3" height="0.1" color="#c8b88a"></a-cylinder>

  <!-- Subtle ripple ring on the water surface -->
  <a-torus position="5.5 0.15 3.5"
           radius="1.1" radius-tubular="0.03"
           rotation="90 0 0" color="#55bbdd" opacity="0.5">
  </a-torus>

  <!-- ============================================================
       TROPICAL FLOWERS — cone-petal hibiscus style
       Completely different from the original's sphere flowers.
       Each flower is made of 5 cone primitives arranged in a circle
       to look like petals, with a small cylinder stamen.
       ============================================================ -->

  <!-- Flower A — orange/red hibiscus, left of hut steps -->
  <a-cylinder position="-1.0 0.55 4.2" radius="0.04" height="1.1" color="#3A7A1A"></a-cylinder>
  <a-cone position="-1.0 1.15 4.2" radius-bottom="0.25" radius-top="0.0" height="0.2" color="#FF4500" rotation="-20   0 0"></a-cone>
  <a-cone position="-1.0 1.15 4.2" radius-bottom="0.25" radius-top="0.0" height="0.2" color="#FF6020" rotation="-20  72 0"></a-cone>
